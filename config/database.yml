default: &default
  adapter: sqlite3
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: 5000

development:
  <<: *default
  database: storage/development.sqlite3

test:
  <<: *default
  database: storage/test.sqlite3

production:
  # The Primary database (Trends, Analysis)
  primary:
    <<: *default
    url: <%= ENV["libsql://sentiment-engine-prod-robdoestech.aws-us-east-2.turso.io"] %>
    auth_token: <%= ENV["eyJhbGciOiJFZERTQSIsInR5cCI6IkpXVCJ9.eyJhIjoicnciLCJpYXQiOjE3NzI0MjcwNjksImlkIjoiMDE5Y2FjZTItOTEwMS03YjFiLWIxNzUtMzExNDE2YjM0YmRjIiwicmlkIjoiYjRmNDUzYmItMjVlMC00ZDQyLWFkM2MtYzRlZTg3NjE4NGFjIn0.LxkVsQloP2c6d3-CbBUMLosxVrJxJAK8ei3gOyQZ3E2mZU8gg9nHfnR6JuWbNZTmEbkMLPoSI9l90hwxpeRfAQ"] %>
    migrations_paths: db/migrate

